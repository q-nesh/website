
<!DOCTYPE html>
<html>

	<style>
		body {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

@font-face {
  font-family: 'arial';
  src: url(font/arialnarrow.ttf);
}

@font-face {
  font-family: 'arialbold';
  src: url(font/arialnarrow_bold.ttf);
}

a, span, .hoverable {
	cursor: url(img/cursor33.png), auto;
}
a {
  margin-top: -100px;
  margin-left: -16vw;
  font-family: 'arial';
  transform: scale(0.7);
  font-weight: lighter;
  text-align: center;
  transform: scale(1.2);
  animation: pulseblur 3s infinite cubic-bezier(1, 1.11, 1, 0.29), scale 3s forwards cubic-bezier(0.5, 1, 0.89, 1);
  color: #18590E;
  font-size: 30px;
  padding: 5px;
  rotate: -1deg;
	transition: 0.2s ease-out;
	transform:  scale(1.2);
  text-decoration: none;
}

a:hover {
  font-size: 32px;
	transition: 0.1s ease-out;
}

.hoverable:hover{
  font-size: 35px;
	transform: scale(1.07) translateY(0.3px);
	transition: 0.1s ease-out;
	filter:blur(1)
}
@keyframes scale {
  0% {pointer-events: none;}
  50% {pointer-events: none;}
  100% {
    transform: scale(1);
	pointer-events: all;
  }
}
@keyframes pulseblur {
	0% {
        filter: blur(0.7px);
    }
50% {
        filter: blur(2px);
}
	100% {
        filter: blur(0.5px);
    }
}

span {
  margin: 2px;
  display: inline-block;
  opacity: 0;
  filter: blur(4px);
}

span:nth-child(1) {
  animation: fade-in 0.8s 0.1s forwards cubic-bezier(0.11, 0, 0.5, 0);
}

span:nth-child(2) {

}

@keyframes fade-in {
  100% {
    opacity: 1;
    filter: blur(0);
  }
}


@media screen and (max-width: 800px) {
  a{
  margin-left: 0;
  }
}

</head>
